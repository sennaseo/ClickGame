<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>신입사원 스탯 빌더 v5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09090b;--card:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.07);--text:#fafafa;--muted:#71717a}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:.7}}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ════════════════════════════════════════════
// 신입사원 스탯 빌더 v5 — 심플 버전
// ════════════════════════════════════════════

const S = [
  { id:"anger",    name:"분노조절장애", em:"🤬", c:"#FF416C", desc:"사수가 또 퇴근 직전에 일 줌" },
  { id:"peterpan", name:"피터팬증후군", em:"🧚", c:"#A18CD1", desc:"어른이 되기 싫어요..." },
  { id:"avoidant", name:"회피형",       em:"🏃", c:"#667EEA", desc:"카톡 1 읽씹 3일째" },
  { id:"menhera",  name:"멘헤라력",     em:"🩹", c:"#F093FB", desc:"아무도 날 이해 못해..." },
  { id:"tsundere", name:"쯔쿤데레력",   em:"💢", c:"#FA709A", desc:"관심 없거든? (관심 폭발)" },
  { id:"chuuni",   name:"중2병",       em:"⚔️", c:"#8E2DE2", desc:"봉인된 왼팔이 떨린다..." },
  { id:"simp",     name:"호구력",       em:"🐶", c:"#38EF7D", desc:"네 제가 할게요... (또)" },
  { id:"delusion", name:"망상력",       em:"🌀", c:"#FFD200", desc:"나 천재인데 발굴 안 됨" },
];

const SHOP = [
  { id:"s1", name:"에너지드링크 원샷",  cost:10, stat:"anger",    amt:8,  em:"🥤" },
  { id:"s2", name:"닌텐도 e숍 카드",    cost:10, stat:"peterpan", amt:8,  em:"🎮" },
  { id:"s3", name:"노이즈캔슬링 이어폰", cost:10, stat:"avoidant", amt:8,  em:"🎧" },
  { id:"s4", name:"감성 일기장",        cost:10, stat:"menhera",  amt:8,  em:"📓" },
  { id:"s5", name:"까칠한 선글라스",     cost:10, stat:"tsundere", amt:8,  em:"🕶️" },
  { id:"s6", name:"검은 망토",          cost:10, stat:"chuuni",   amt:8,  em:"🧥" },
  { id:"s7", name:"스타벅스 기프티콘",   cost:10, stat:"simp",     amt:8,  em:"☕" },
  { id:"s8", name:"자기계발서",         cost:10, stat:"delusion",  amt:8,  em:"📖" },
  { id:"s9", name:"🎰 럭키박스",       cost:25, stat:"random",   amt:15, em:"🎰" },
];

const SCENARIOS = [
  { t:"퇴근 10분 전, 사수가 다가온다...",  s:"\"이거 하나만 더 하고 가\"" },
  { t:"점심시간, 팀장이 회식을 제안한다",   s:"오늘의 운명을 골라주세요" },
  { t:"새벽 2시, 카톡이 울린다",          s:"누가 보냈을까..." },
  { t:"월요일 아침, 알람이 울린다",        s:"이 신입의 반응은?" },
  { t:"동기가 먼저 승진했다",             s:"이 순간의 감정을 골라주세요" },
  { t:"사수가 '한번 보자' 라고 했다",      s:"...뭘 보자는 거지" },
  { t:"인사팀에서 면담 요청이 왔다",       s:"대체 무슨 일이..." },
];

const EYES = [["◕","◕"],["◔","◔"],["◉","◉"],["⊙","⊙"],["◎","◎"],["✖","✖"]];
const MOUTHS = ["ω","д","∀","Д","益","□"];
const corLv = t => t<50?0:t<150?1:t<300?2:t<500?3:t<700?4:5;

const pick2 = () => {
  const sh = [...S].sort(() => Math.random() - 0.5);
  return [sh[0], sh[1]];
};

// ─── Radar ───
function Radar({ stats, size = 180 }) {
  const n = S.length;
  const cx = size/2, cy = size/2, r = size * 0.36;
  const ang = (i) => (Math.PI * 2 * i) / n - Math.PI / 2;
  const pt = (i, v) => [cx + Math.cos(ang(i)) * r * (v/100), cy + Math.sin(ang(i)) * r * (v/100)];

  const grid = [50, 100];
  const data = S.map((s, i) => pt(i, stats[s.id]));
  const d = data.map((p,i) => `${i===0?"M":"L"}${p[0]},${p[1]}`).join(" ") + "Z";

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display:"block" }}>
      {grid.map(lv => {
        const pts = S.map((_,i) => pt(i,lv));
        return <path key={lv} d={pts.map((p,i)=>`${i===0?"M":"L"}${p[0]},${p[1]}`).join(" ")+"Z"} fill="none" stroke="rgba(255,255,255,0.06)" />;
      })}
      {S.map((_,i) => <line key={i} x1={cx} y1={cy} x2={cx+Math.cos(ang(i))*r} y2={cy+Math.sin(ang(i))*r} stroke="rgba(255,255,255,0.04)" />)}
      <path d={d} fill="rgba(129,140,248,0.12)" stroke="rgba(129,140,248,0.6)" strokeWidth={1.5} strokeLinejoin="round" style={{transition:"d .4s ease"}} />
      {data.map((p,i) => stats[S[i].id]>0 && <circle key={i} cx={p[0]} cy={p[1]} r={3} fill={S[i].c} style={{transition:"all .4s ease"}} />)}
      {S.map((s,i) => {
        const lx = cx + Math.cos(ang(i))*(r+16);
        const ly = cy + Math.sin(ang(i))*(r+16);
        return <text key={i} x={lx} y={ly} textAnchor="middle" dominantBaseline="central" fontSize={13} fill="rgba(255,255,255,0.4)">{s.em}</text>;
      })}
    </svg>
  );
}

// ─── Face ───
function Face({ lv, dominant, shaking }) {
  const st = S.find(s => s.id === dominant) || S[0];
  const paint = lv >= 5;
  return (
    <div style={{
      animation: lv>=4?"shake .3s infinite":lv>=2?"float 3s ease-in-out infinite":"none",
      transform: shaking?"scale(1.1)":"scale(1)", transition:"transform .15s ease",
    }}>
      <div style={{
        width:110, height:110, borderRadius: paint?8:"50%",
        background: paint?"#ffff00":`linear-gradient(135deg,${st.c}15,transparent)`,
        border: paint?`3px dashed ${st.c}`:`2px solid ${st.c}22`,
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        fontFamily: paint?"'Comic Sans MS',cursive":"inherit",
        boxShadow: paint?"none":`0 0 40px ${st.c}10`,
        margin:"0 auto",
      }}>
        <div style={{ display:"flex", gap:paint?16:12, fontSize:paint?20:24, color:paint?"#000":"#fafafa" }}>
          <span>{EYES[lv][0]}</span><span>{EYES[lv][1]}</span>
        </div>
        <div style={{ fontSize:paint?24:20, marginTop:4, color:paint?"#000":"#fafafa" }}>{MOUTHS[lv]}</div>
      </div>
    </div>
  );
}

// ─── Choice Modal ───
function ChoiceModal({ opts, scene, onPick }) {
  const [cd, setCd] = useState(10);
  const stableOpts = useRef(opts);
  const flavors = useRef(opts.map(o => o.desc));

  useEffect(() => {
    if (cd <= 0) { onPick(stableOpts.current[Math.floor(Math.random()*2)].id); return; }
    const t = setTimeout(() => setCd(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [cd, onPick]);

  return (
    <div style={{ position:"fixed", inset:0, zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.85)", backdropFilter:"blur(12px)" }} />
      <div style={{ position:"relative", width:"100%", maxWidth:440, margin:"0 16px", animation:"modalIn .3s ease" }}>
        <div style={{ background:"rgba(20,18,28,.98)", borderRadius:"20px 20px 0 0", padding:"28px 24px 20px", textAlign:"center", border:"1px solid var(--border)", borderBottom:"none" }}>
          <div style={{ fontSize:11, fontWeight:600, color:"#818cf8", marginBottom:8 }}>
            ⚡ 이벤트 · <span style={{color:cd<=3?"#f87171":"inherit"}}>⏱ {cd}초</span>
          </div>
          <div style={{ fontSize:18, fontWeight:800 }}>{scene.t}</div>
          <div style={{ fontSize:13, color:"var(--muted)", marginTop:4 }}>{scene.s}</div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", position:"relative" }}>
          {stableOpts.current.map((o, idx) => (
            <button key={o.id} onClick={() => onPick(o.id)} style={{
              display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
              padding:"28px 16px 24px", border:"1px solid var(--border)", cursor:"pointer",
              background:"rgba(12,10,22,.98)", fontFamily:"inherit", color:"#fafafa",
              borderRadius: idx===0?"0 0 0 20px":"0 0 20px 0", transition:"background .2s",
            }}
              onMouseEnter={e => e.currentTarget.style.background=`${o.c}10`}
              onMouseLeave={e => e.currentTarget.style.background="rgba(12,10,22,.98)"}
            >
              <span style={{ fontSize:44, marginBottom:12 }}>{o.em}</span>
              <span style={{ fontSize:15, fontWeight:700, marginBottom:4 }}>{o.name}</span>
              <span style={{ fontSize:11, color:"var(--muted)" }}>{flavors.current[idx]}</span>
              <div style={{ marginTop:12, background:o.c, padding:"4px 16px", borderRadius:16, fontSize:13, fontWeight:700, color:"#fff" }}>선택</div>
            </button>
          ))}
          <div style={{
            position:"absolute", left:"50%", top:"50%", transform:"translate(-50%,-50%)",
            width:32, height:32, borderRadius:"50%", background:"#18181b",
            border:"2px solid rgba(255,255,255,0.08)", display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:10, fontWeight:900, color:"#818cf8",
          }}>VS</div>
        </div>
      </div>
    </div>
  );
}

// ─── Toast ───
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, [onDone]);
  return (
    <div style={{
      position:"fixed", top:16, left:"50%", transform:"translateX(-50%)", zIndex:2000,
      background:"rgba(24,24,27,.95)", backdropFilter:"blur(16px)", color:"#fafafa",
      padding:"10px 20px", borderRadius:12, fontSize:13, fontWeight:600,
      border:"1px solid var(--border)", animation:"fadeUp .25s ease",
    }}>{msg}</div>
  );
}

// ─── Click Burst ───
function Burst({ x, y, emoji }) {
  const [gone, setGone] = useState(false);
  useEffect(() => { setTimeout(() => setGone(true), 500); }, []);
  if (gone) return null;
  return <div style={{ position:"fixed", left:x-12, top:y-12, pointerEvents:"none", zIndex:1500, fontSize:24, animation:"fadeUp .5s forwards" }}>{emoji}</div>;
}

// ════════════════
// MAIN APP
// ════════════════
function App() {
  const init = { anger:0, peterpan:0, avoidant:0, menhera:0, tsundere:0, chuuni:0, simp:0, delusion:0 };
  const [stats, setStats] = useState(init);
  const [bank, setBank] = useState(0);
  const [clicks, setClicks] = useState(0);
  const [bursts, setBursts] = useState([]);
  const [toast, setToast] = useState(null);
  const [shaking, setShaking] = useState(false);
  const [modal, setModal] = useState(null);
  const [shopOpen, setShopOpen] = useState(false);
  const bid = useRef(0);
  const sincePick = useRef(0);

  const total = useMemo(() => Object.values(stats).reduce((a,b)=>a+b, 0), [stats]);
  const lv = corLv(total);
  const sorted = useMemo(() => Object.entries(stats).sort((a,b)=>b[1]-a[1]), [stats]);
  const dom = sorted[0];
  const domStat = S.find(s => s.id === dom[0]) || S[0];
  const nextChoice = 10 - sincePick.current;

  const doClick = useCallback(e => {
    if (modal) return;
    const earn = lv >= 3 ? 3 : lv >= 1 ? 2 : 1;
    setBank(p => p + earn);
    setClicks(p => p + 1);
    sincePick.current += 1;
    const id = ++bid.current;
    const ems = ["💥","⚡","🔥","💢","✨","😱","💀"];
    setBursts(p => [...p, { id, x:e.clientX, y:e.clientY, emoji:ems[Math.floor(Math.random()*ems.length)] }]);
    setTimeout(() => setBursts(p => p.filter(b => b.id !== id)), 600);
    setShaking(true); setTimeout(() => setShaking(false), 120);
    if (sincePick.current >= 10) {
      sincePick.current = 0;
      const [a, b] = pick2();
      const sc = SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)];
      setTimeout(() => setModal({ opts:[a,b], scene:sc }), 300);
    }
  }, [lv, modal]);

  const doPick = useCallback(sid => {
    const inc = lv >= 4 ? 12 : lv >= 2 ? 10 : 8;
    setStats(p => ({ ...p, [sid]: Math.min(p[sid]+inc, 100) }));
    setShaking(true); setTimeout(() => setShaking(false), 250);
    const st = S.find(s => s.id === sid);
    setToast(`${st.em} ${st.name} +${inc}%!`);
    setModal(null);
  }, [lv]);

  const doBuy = useCallback(item => {
    if (bank < item.cost) return;
    const sid = item.stat === "random" ? S[Math.floor(Math.random()*S.length)].id : item.stat;
    setStats(p => ({ ...p, [sid]: Math.min(p[sid]+item.amt, 100) }));
    setBank(p => p - item.cost);
    setShaking(true); setTimeout(() => setShaking(false), 200);
    const st = S.find(s => s.id === sid);
    setToast(`${item.em} ${st.name} +${item.amt}%`);
  }, [bank, stats]);

  const statusMsg = useMemo(() => {
    if (total === 0) return "아직 정상적인 사회인입니다";
    if (total >= 600) return "이 신입은 인간의 영역을 벗어났습니다";
    if (total >= 400) return "정신건강의학과 예약이 필요합니다";
    if (total >= 200) return "인사팀에서 면담 요청이 왔습니다";
    if (total >= 100) return "약간 불안정한 기운이 감지됩니다";
    return `${domStat.name} 기질이 보이기 시작합니다`;
  }, [total, domStat]);

  return (
    <div style={{ minHeight:"100vh", position:"relative", overflow:"hidden" }}>
      {/* BG glow */}
      <div style={{ position:"fixed", top:"-30%", right:"-20%", width:500, height:500, borderRadius:"50%", background:`radial-gradient(circle,${domStat.c}06,transparent 70%)`, pointerEvents:"none", transition:"all 2s" }} />

      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      {bursts.map(b => <Burst key={b.id} {...b} />)}
      {modal && <ChoiceModal opts={modal.opts} scene={modal.scene} onPick={doPick} />}

      <div style={{ maxWidth:420, margin:"0 auto", padding:"32px 16px", position:"relative", zIndex:1 }}>

        {/* Title */}
        <div style={{ textAlign:"center", marginBottom:24 }}>
          <div style={{ fontSize:11, fontWeight:600, color:"#818cf8", letterSpacing:"0.08em", marginBottom:6 }}>✦ 신입사원 스탯 빌더</div>
          <h1 style={{
            fontSize:lv>=5?28:22, fontWeight:900, letterSpacing:"-0.02em",
            fontFamily: lv>=5?"'Comic Sans MS',cursive":"inherit",
            animation: lv>=4?"shake .5s infinite":"none",
          }}>
            {lv >= 5 ? "이 신입은 끝났다" : lv >= 3 ? "위험 수위 돌파" : "이 신입의 운명은?"}
          </h1>
          <div style={{ fontSize:12, color:"var(--muted)", marginTop:6 }}>
            ⚡ {clicks}클릭 · ☠️ {total}% · 다음 이벤트 {nextChoice}클릭
          </div>
        </div>

        {/* Character — click target */}
        <div onClick={doClick} style={{
          background:"var(--card)", border:"1px solid var(--border)", borderRadius:20,
          padding:"32px 20px 24px", textAlign:"center", cursor: modal?"not-allowed":"pointer",
          userSelect:"none", WebkitTapHighlightColor:"transparent",
          transition:"transform .15s ease", position:"relative",
        }}>
          <Face lv={Math.min(lv,5)} dominant={dom[0]} shaking={shaking} />
          <div style={{ marginTop:12, fontSize:13, fontWeight:700, color:domStat.c }}>
            {domStat.em} {domStat.name} {dom[1]}%
          </div>
          <div style={{ fontSize:12, color:"#3f3f46", marginTop:4 }}>{statusMsg}</div>

          {/* Point bank */}
          <div style={{ marginTop:16, display:"inline-flex", alignItems:"center", gap:6, background:"rgba(255,255,255,0.04)", border:"1px solid var(--border)", padding:"6px 16px", borderRadius:16 }}>
            <span style={{ fontSize:18, fontWeight:800, color:domStat.c }}>{bank}</span>
            <span style={{ fontSize:11, color:"var(--muted)" }}>pt</span>
          </div>
          <div style={{ fontSize:10, color:"#27272a", marginTop:6, animation:"breathe 2s infinite" }}>눌러서 포인트 모으기</div>
        </div>

        {/* Radar — compact */}
        <div style={{
          background:"var(--card)", border:"1px solid var(--border)", borderRadius:20,
          padding:"16px", marginTop:12, display:"flex", justifyContent:"center",
        }}>
          <Radar stats={stats} size={180} />
        </div>

        {/* Shop toggle */}
        <button onClick={() => setShopOpen(p => !p)} style={{
          width:"100%", marginTop:12, padding:"14px", borderRadius:16,
          background: shopOpen ? "rgba(129,140,248,0.08)" : "var(--card)",
          border: `1px solid ${shopOpen ? "rgba(129,140,248,0.2)" : "var(--border)"}`,
          cursor:"pointer", fontFamily:"inherit", color:"var(--text)",
          fontSize:14, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", gap:8,
          transition:"all .2s",
        }}>
          🛒 상점
          <span style={{ fontSize:12, fontWeight:600, color:"var(--muted)" }}>
            ({bank}pt 보유)
          </span>
          <span style={{ fontSize:11, transform: shopOpen?"rotate(180deg)":"rotate(0)", transition:"transform .2s" }}>▼</span>
        </button>

        {/* Shop items — collapsible */}
        {shopOpen && (
          <div style={{
            background:"var(--card)", border:"1px solid var(--border)", borderRadius:16,
            padding:12, marginTop:4, animation:"fadeUp .2s ease",
            display:"grid", gridTemplateColumns:"1fr 1fr", gap:6,
          }}>
            {SHOP.map(item => {
              const stat = S.find(s => s.id === item.stat);
              const canBuy = bank >= item.cost;
              return (
                <button key={item.id} onClick={() => doBuy(item)} disabled={!canBuy} style={{
                  display:"flex", alignItems:"center", gap:8, padding:"10px 12px",
                  borderRadius:12, border:"1px solid var(--border)",
                  background: canBuy ? "rgba(255,255,255,0.02)" : "transparent",
                  cursor: canBuy ? "pointer" : "not-allowed", opacity: canBuy ? 1 : 0.3,
                  fontFamily:"inherit", color:"var(--text)", textAlign:"left",
                  transition:"all .2s",
                }}>
                  <span style={{ fontSize:20, flexShrink:0 }}>{item.em}</span>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:12, fontWeight:700, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{item.name}</div>
                    <div style={{ fontSize:10, color:"var(--muted)" }}>
                      {item.cost}pt → {item.stat === "random" ? "랜덤" : stat?.em} +{item.amt}%
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        )}

        {/* Footer */}
        <div style={{ textAlign:"center", padding:"24px 0 16px", fontSize:10, color:"#27272a" }}>
          Lv.{lv} · 총 오염도 {total}%
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
